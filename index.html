<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verify</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: radial-gradient(circle at top, #1e3c72, #0f2027);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 40px;
  border-radius: 20px;
  text-align: center;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 40px rgba(0,0,0,0.5);
}

.btn {
  margin-top: 20px;
  background: #5865F2;
  padding: 15px 30px;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  font-size: 18px;
  transition: 0.3s;
  display: inline-block;
}

.btn:hover {
  transform: scale(1.1);
  background: #4752c4;
}
</style>

</head>

<body>

<div class="card">
  <h1>🔐 Verify Account</h1>
  <p>กดยืนยันเพื่อเข้าใช้งานเซิร์ฟเวอร์</p>
  <a href="/login" class="btn">Login with Discord</a>
</div>

</body>
</html>
